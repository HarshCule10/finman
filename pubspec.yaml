name: finman
description: "Finance Manager — A clean fintech-style expense tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive_flutter: ^1.1.0
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/welcome.png"
  adaptive_icon_background: "#0A1123"
  adaptive_icon_foreground: "assets/images/welcome.png"
  min_sdk_android: 21
